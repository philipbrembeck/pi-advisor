name: Tag package releases

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

concurrency:
  group: package-release-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Tag package version
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create package version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_version="$(git show "${{ github.event.before }}:package.json" 2>/dev/null | node -e 'let s=""; process.stdin.on("data", d => s += d).on("end", () => console.log(JSON.parse(s).version))' || true)"
          version="$(node -p "require('./package.json').version")"
          if [ "$version" = "$previous_version" ]; then
            echo "package.json version unchanged; no release tag needed."
            exit 0
          fi
          if ! node -e 'const v = process.argv[1]; if (!/^\d+\.\d+\.\d+$/.test(v)) process.exit(1)' "$version"; then
            echo "Invalid package version: $version" >&2
            exit 1
          fi
          tag="v$version"
          created=false
          existing_commit="$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [ -n "$existing_commit" ]; then
            if [ "$existing_commit" != "${{ github.sha }}" ]; then
              echo "Tag $tag already exists at $existing_commit, not ${{ github.sha }}." >&2
              exit 1
            fi
            echo "Tag $tag already points at this commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
            created=true
          fi
          if [ "$created" = true ]; then
            gh workflow run publish.yml --ref "$tag"
          fi
