name: Publish packages

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Test and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify the release
        run: |
          test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
          bun run typecheck
          bun test

      - name: Publish to npm
        run: |
          package_version="pi-advisor-flow@$(node -p "require('./package.json').version")"
          if output=$(npm view "$package_version" version 2>&1); then
            echo "This npm version is already published; skipping."
          elif grep -q 'E404' <<<"$output"; then
            npm publish --access public --provenance
          else
            echo "$output" >&2
            exit 1
          fi

      - name: Publish the GitHub Packages mirror
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from "node:fs/promises";

          const packageJson = JSON.parse(await readFile("package.json", "utf8"));
          packageJson.name = "@philipbrembeck/pi-advisor-flow";
          await writeFile("package.json", `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF
          npm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          package_version="@philipbrembeck/pi-advisor-flow@$(node -p "require('./package.json').version")"
          if output=$(npm view "$package_version" version --registry=https://npm.pkg.github.com 2>&1); then
            echo "This GitHub Packages version is already published; skipping."
          elif grep -q 'E404' <<<"$output"; then
            npm publish --registry=https://npm.pkg.github.com
          else
            echo "$output" >&2
            exit 1
          fi
